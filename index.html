<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Road Trip · Itinerario</title>
<link rel="manifest" href="/seattle-2026/manifest.json">
<meta name="theme-color" content="#09131D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Road Trip">
<link rel="apple-touch-icon" href="/seattle-2026/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #09131D;
  --card: #111D2A;
  --card2: #162333;
  --border: rgba(255,255,255,0.09);
  --coral: #FF7B54;
  --gold: #FFB830;
  --mint: #3ECFB2;
  --sky: #5BA4D4;
  --white: #F0F4F8;
  --gray: #4D6070;
  --muted: #8A9DAD;
  --red: #FF5252;
  --safe-top: env(safe-area-inset-top);
  --safe-bot: env(safe-area-inset-bottom);
}

html, body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Sora', sans-serif;
  overflow-x: hidden;
  min-height: 100vh;
}

body { padding-bottom: calc(90px + var(--safe-bot)); }

/* ── HERO ──────────────────────────────── */
.hero {
  position: relative;
  height: 280px;
  overflow: hidden;
  border-radius: 0 0 28px 28px;
}
.hero-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  filter: brightness(0.55) saturate(1.1);
}
.hero-grad {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(9,19,29,0.2) 0%, rgba(9,19,29,0.85) 100%);
}
.hero-top {
  position: relative; z-index: 2;
  padding: calc(14px + var(--safe-top)) 16px 0;
  display: flex; justify-content: space-between; align-items: center;
}
.hero-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2);
  color: white; font-size: 18px; cursor: pointer;
  display: grid; place-items: center; backdrop-filter: blur(10px);
}
.hero-clock {
  background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px; padding: 8px 14px; backdrop-filter: blur(12px);
  font-family: 'Space Mono', monospace; font-size: 12px; color: rgba(255,255,255,0.85);
}
.hero-body {
  position: absolute; z-index: 2;
  bottom: 0; left: 0; right: 0;
  padding: 0 18px 18px;
}
.hero-eyebrow {
  font-family: 'Space Mono', monospace;
  font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; color: rgba(255,255,255,0.7);
  margin-bottom: 6px;
}
.hero-title {
  font-size: 32px; font-weight: 800;
  line-height: 1.05; letter-spacing: -0.5px;
  margin-bottom: 12px;
}

/* INFO PILLS */
.info-row { display: flex; gap: 8px; flex-wrap: wrap; }
.info-pill {
  display: flex; align-items: center; gap: 7px;
  background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.14);
  border-radius: 30px; padding: 8px 12px; backdrop-filter: blur(14px);
  font-size: 12px; font-weight: 600; flex: 1; min-width: 0;
}
.info-pill .pill-icon { font-size: 16px; flex-shrink: 0; }
.info-pill .pill-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--white); }

/* ── PROGRESS ───────────────────────────── */
.progress {
  display: flex; gap: 3px;
  padding: 14px 16px 0;
}
.p-dot {
  flex: 1; height: 3px; border-radius: 99px;
  background: rgba(255,255,255,0.1);
}
.p-dot.done { background: rgba(255,255,255,0.3); }
.p-dot.active { background: var(--coral); }

/* ── DAY TABS ───────────────────────────── */
.day-tabs {
  display: flex; gap: 6px;
  padding: 12px 16px 0;
  overflow-x: auto; scrollbar-width: none;
}
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  flex: 0 0 auto;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 10px 14px;
  cursor: pointer; text-align: center;
  transition: all 0.2s;
}
.day-tab strong { display: block; font-size: 13px; color: var(--white); margin-bottom: 2px; }
.day-tab span { display: block; font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); }
.day-tab.active {
  background: var(--coral); border-color: var(--coral);
  box-shadow: 0 8px 20px rgba(255,123,84,0.3);
}
.day-tab.active strong, .day-tab.active span { color: white; }
.day-tab.past { opacity: 0.5; }

/* ── NOW CARD ───────────────────────────── */
.now-wrap { padding: 14px 16px 0; }
.now-card {
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 20px; padding: 16px;
  position: relative; overflow: hidden;
}
.now-card::before {
  content: ''; position: absolute;
  width: 140px; height: 140px; border-radius: 50%;
  right: -50px; top: -50px;
  background: radial-gradient(circle, rgba(255,123,84,0.25), transparent 70%);
  pointer-events: none;
}
.now-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: 2px; color: var(--coral);
  text-transform: uppercase; margin-bottom: 6px;
}
.now-title { font-size: 17px; font-weight: 800; line-height: 1.3; margin-bottom: 4px; }
.now-sub { font-size: 13px; color: var(--muted); line-height: 1.4; margin-bottom: 14px; }
.now-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.now-btn {
  border: 1px solid var(--border); background: rgba(255,255,255,0.07);
  color: var(--white); border-radius: 30px; padding: 10px 16px;
  font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; gap: 6px;
}
.now-btn.primary { background: var(--coral); border-color: var(--coral); }
.now-btn.sky { background: rgba(91,164,212,0.15); border-color: rgba(91,164,212,0.3); color: #8ECFEF; }

/* ── ALERT ───────────────────────────────── */
.alert-wrap { padding: 10px 16px 0; }
.alert-strip {
  display: flex; gap: 12px; align-items: center;
  background: rgba(255,82,82,0.08); border: 1px solid rgba(255,82,82,0.2);
  border-radius: 16px; padding: 12px 14px;
}
.alert-icon { font-size: 20px; flex-shrink: 0; }
.alert-title { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.alert-sub { font-size: 12px; color: var(--muted); line-height: 1.4; }

/* ── TIMELINE ────────────────────────────── */
.tl-header {
  padding: 18px 16px 10px;
  display: flex; justify-content: space-between; align-items: center;
}
.tl-header h2 { font-size: 20px; font-weight: 800; }
.tl-header span { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); }

.timeline { padding: 0 16px; position: relative; }
.timeline::before {
  content: '';
  position: absolute; left: 52px; top: 0; bottom: 0;
  width: 1.5px;
  background: linear-gradient(to bottom, rgba(255,255,255,0.15), rgba(255,255,255,0.03));
}

/* STOP CARD */
.stop-row {
  display: grid;
  grid-template-columns: 36px 30px 1fr;
  gap: 0 10px;
  margin-bottom: 8px;
  align-items: center;
  position: relative;
}
.stop-time {
  text-align: right;
  padding-right: 2px;
}
.stop-time .sh { display: block; font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; color: var(--white); line-height: 1; }
.stop-time .sa { display: block; font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); margin-top: 2px; }
.stop-dot {
  width: 30px; height: 30px; border-radius: 50%;
  display: grid; place-items: center;
  font-size: 14px; position: relative; z-index: 2;
  background: var(--card2); border: 1.5px solid var(--border);
  flex-shrink: 0;
}
.stop-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 13px 14px;
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; gap: 12px;
  min-height: 64px;
  -webkit-tap-highlight-color: transparent;
}
.stop-card:active { transform: scale(0.98); background: var(--card2); }
.stop-card.done-card { opacity: 0.45; }
.stop-card.skipped-card { opacity: 0.3; }
.stop-left { flex: 1; min-width: 0; }
.stop-tag {
  display: inline-flex; align-items: center; gap: 3px;
  font-family: 'Space Mono', monospace;
  font-size: 8px; letter-spacing: 0.8px; text-transform: uppercase;
  border-radius: 6px; padding: 2px 7px; margin-bottom: 5px;
}
.c-coral .stop-tag { background: rgba(255,123,84,0.15); color: var(--coral); }
.c-gold  .stop-tag { background: rgba(255,184,48,0.15); color: var(--gold); }
.c-mint  .stop-tag { background: rgba(62,207,178,0.15); color: var(--mint); }
.c-sky   .stop-tag { background: rgba(91,164,212,0.15); color: var(--sky); }
.stop-name {
  font-size: 15px; font-weight: 700; line-height: 1.25;
  color: var(--white);
  overflow: hidden; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}
.stop-desc {
  font-size: 12px; color: var(--muted); line-height: 1.35;
  margin-top: 3px;
  overflow: hidden; display: -webkit-box;
  -webkit-line-clamp: 1; -webkit-box-orient: vertical;
}
.stop-thumb {
  width: 56px; height: 56px; border-radius: 12px;
  object-fit: cover; flex-shrink: 0;
  border: 1px solid rgba(255,255,255,0.08);
  background: var(--card2);
}
.stop-chevron { color: var(--muted); font-size: 16px; flex-shrink: 0; }

/* TRANSIT ROW */
.transit-row {
  display: grid;
  grid-template-columns: 36px 30px 1fr;
  gap: 0 10px;
  margin-bottom: 8px;
  align-items: center;
}
.transit-pill {
  grid-column: 3;
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  border-radius: 30px; padding: 6px 12px;
  font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted);
}

/* NIGHT CARD */
.night-row { padding: 4px 0 18px 76px; }
.night-card {
  display: flex; gap: 10px; align-items: center;
  background: rgba(255,255,255,0.04); border: 1px dashed rgba(255,255,255,0.1);
  border-radius: 14px; padding: 12px 14px;
}
.night-icon { font-size: 20px; }
.night-text { font-size: 13px; color: var(--muted); line-height: 1.4; }
.night-text strong { color: var(--white); display: block; margin-bottom: 2px; }

/* ── BOTTOM NAV ──────────────────────────── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
  background: rgba(9,19,29,0.9); backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 10px 16px calc(10px + var(--safe-bot));
  display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: center;
}
.nav-btn {
  border: 1px solid var(--border); background: rgba(255,255,255,0.07);
  color: var(--white); border-radius: 30px; padding: 13px;
  font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer;
}
.nav-btn.primary { background: var(--coral); border-color: var(--coral); }
.nav-center {
  text-align: center; font-family: 'Space Mono', monospace;
  font-size: 10px; color: var(--muted); white-space: nowrap;
}
.nav-center strong { color: var(--white); }

/* ── BOTTOM SHEET (detalle completo) ───────── */
.sheet-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.6);
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
  backdrop-filter: blur(4px);
}
.sheet-overlay.open { opacity: 1; pointer-events: all; }

.sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 101;
  background: var(--card);
  border-radius: 24px 24px 0 0;
  max-height: 92vh;
  overflow-y: auto;
  overflow-x: hidden;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  -webkit-overflow-scrolling: touch;
}
.sheet.open { transform: translateY(0); }

.sheet-handle {
  width: 36px; height: 4px; border-radius: 99px;
  background: rgba(255,255,255,0.2);
  margin: 10px auto 0;
}
.sheet-img {
  width: 100%; height: 240px;
  object-fit: cover;
  margin-top: 12px;
}
.sheet-img-placeholder {
  width: 100%; height: 200px; margin-top: 12px;
  background: linear-gradient(135deg, var(--card2), rgba(255,123,84,0.1));
  display: flex; align-items: center; justify-content: center;
  font-size: 56px;
}
.sheet-content { padding: 20px 20px calc(20px + var(--safe-bot)); }
.sheet-tag {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: 'Space Mono', monospace; font-size: 9px;
  letter-spacing: 1px; text-transform: uppercase;
  border-radius: 8px; padding: 4px 10px; margin-bottom: 10px;
}
.sheet-title { font-size: 26px; font-weight: 800; line-height: 1.1; margin-bottom: 6px; }
.sheet-desc { font-size: 14px; color: var(--muted); line-height: 1.5; margin-bottom: 20px; }

/* SHEET ACTIONS ROW */
.sheet-actions {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 8px; margin-bottom: 24px;
}
.sheet-action-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 16px; padding: 14px 8px; cursor: pointer;
  color: var(--white); font-family: 'Sora', sans-serif;
}
.sheet-action-btn .btn-icon { font-size: 22px; }
.sheet-action-btn .btn-label { font-size: 11px; font-weight: 600; }
.sheet-action-btn.maps { background: rgba(91,164,212,0.1); border-color: rgba(91,164,212,0.3); color: #8ECFEF; }
.sheet-action-btn.done { background: rgba(62,207,178,0.1); border-color: rgba(62,207,178,0.3); color: var(--mint); }
.sheet-action-btn.skip { background: rgba(255,255,255,0.05); }

/* SHEET DATA ROWS */
.sheet-section { margin-bottom: 20px; }
.sheet-section-title {
  font-family: 'Space Mono', monospace; font-size: 9px;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 10px;
}
.sheet-address {
  display: flex; gap: 12px; align-items: flex-start;
  background: var(--card2); border-radius: 14px; padding: 14px;
}
.sheet-address .addr-icon { font-size: 22px; flex-shrink: 0; margin-top: 2px; }
.sheet-address .addr-main { font-size: 15px; font-weight: 600; line-height: 1.3; }
.sheet-address .addr-sub { font-size: 12px; color: var(--muted); margin-top: 3px; font-family: 'Space Mono', monospace; }

.task-list { display: flex; flex-direction: column; gap: 10px; }
.task-item {
  display: flex; gap: 12px; align-items: flex-start;
  font-size: 15px; color: var(--muted); line-height: 1.45;
}
.task-bullet {
  width: 7px; height: 7px; border-radius: 50%;
  margin-top: 7px; flex-shrink: 0;
}
.c-coral .task-bullet { background: var(--coral); }
.c-gold  .task-bullet { background: var(--gold); }
.c-mint  .task-bullet { background: var(--mint); }
.c-sky   .task-bullet { background: var(--sky); }

.price-row {
  display: flex; align-items: center; gap: 12px;
  background: rgba(255,184,48,0.08); border: 1px solid rgba(255,184,48,0.2);
  border-radius: 14px; padding: 14px;
}
.price-icon { font-size: 22px; }
.price-value { font-size: 18px; font-weight: 800; color: var(--gold); }
.price-mxn { font-size: 12px; color: var(--muted); margin-top: 2px; }

.sheet-alert {
  display: flex; gap: 12px; align-items: flex-start;
  background: rgba(255,82,82,0.08); border: 1px solid rgba(255,82,82,0.2);
  border-radius: 14px; padding: 14px; color: #FF8B8B;
}
.sheet-alert .alert-icon { font-size: 20px; flex-shrink: 0; }
.sheet-alert .alert-text { font-size: 14px; line-height: 1.45; }

/* CLOSE BTN */
.sheet-close {
  position: absolute; top: 16px; right: 16px;
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.12); border: none;
  color: white; font-size: 18px; cursor: pointer;
  display: grid; place-items: center;
  z-index: 10;
}

/* ERRORS */
.err-box {
  margin: 20px 16px; background: rgba(255,82,82,0.08);
  border: 1px solid rgba(255,82,82,0.25); color: #FF8B8B;
  padding: 16px; border-radius: 18px; font-size: 13px; line-height: 1.5;
}

/* OFFLINE */
.offline-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  background: rgba(255,82,82,0.9); color: white;
  text-align: center; font-size: 12px; font-family: 'Space Mono', monospace;
  padding: calc(6px + var(--safe-top)) 12px 6px;
  display: none;
}
.offline-bar.show { display: block; }
</style>
</head>
<body>

<div class="offline-bar" id="offlineBar">📵 Sin conexión · Usando datos guardados</div>

<!-- App root -->
<div id="app"><div style="padding:40px 20px;color:white;font-family:Arial;text-align:center;">⏳ Cargando...</div></div>

<!-- Bottom sheet para detalle de parada -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <button class="sheet-close" onclick="closeSheet()">✕</button>
  <div class="sheet-handle"></div>
  <div id="sheetContent"></div>
</div>

<script>
// ─── CONFIG ────────────────────────────────
var API_URL = 'https://script.google.com/macros/s/AKfycbxRjW3k_a-b7btvbmVVbdarfJIUSf4Q3erwqGJf0V6PnFFnOjg1WryzXJmh2Lqywlq6Jg/exec';
// ────────────────────────────────────────────

var currentDay = 1;
var currentRows = [];
var currentMeta = {};

// Online/offline
window.addEventListener('offline', function() { document.getElementById('offlineBar').classList.add('show'); });
window.addEventListener('online',  function() { document.getElementById('offlineBar').classList.remove('show'); });
if (!navigator.onLine) document.getElementById('offlineBar').classList.add('show');

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/seattle-2026/sw.js').catch(function(){});
}

// ─── UTILS ─────────────────────────────────
function esc(v) {
  return String(v == null ? '' : v)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

var DAY_LABELS = {
  1:'10 AGO',2:'11 AGO',3:'12 AGO',4:'13 AGO',5:'14 AGO',
  6:'15 AGO',7:'16 AGO',8:'17 AGO',9:'18 AGO'
};

function formatDate(v) {
  if (!v) return '';
  var p = String(v).split('-');
  if (p.length !== 3) return String(v);
  var d = new Date(+p[0], +p[1]-1, +p[2]);
  var wd = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  var mo = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return wd[d.getDay()] + ' ' + (+p[2]) + ' de ' + mo[+p[1]-1] + ' · ' + p[0];
}

function clock() {
  var d = new Date();
  return d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
}

function toMin(v) {
  if (!v) return null;
  var t = String(v).trim().toLowerCase();
  var m = t.match(/(\d{1,2}):(\d{2})/);
  if (!m) return null;
  var h = +m[1], min = +m[2];
  if (t.includes('pm') && h !== 12) h += 12;
  if (t.includes('am') && h === 12) h = 0;
  return h * 60 + min;
}

function nowMin() { var d = new Date(); return d.getHours()*60 + d.getMinutes(); }

function timeParts(v) {
  var m = String(v||'').trim().match(/(\d{1,2}):(\d{2})/);
  if (!m) return { h: v||'—', a: '' };
  var h = +m[1], mn = m[2];
  var a = h >= 12 ? 'pm' : 'am';
  h = h % 12 || 12;
  return { h: h + ':' + mn, a: a };
}

function tasks(v) {
  if (!v) return [];
  return String(v).split('|').map(function(s){return s.trim();}).filter(Boolean);
}

function money(v) {
  if (!v) return null;
  var n = Number(String(v).replace(',','.'));
  return isNaN(n) ? null : n;
}

function fmtMoney(n) { return Math.round(n).toLocaleString('es-MX'); }

// ─── STATE KEYS ────────────────────────────
function sk(order, action) { return 'rt_d' + currentDay + '_' + order + '_' + action; }
function isDone(r) { return localStorage.getItem(sk(r.orden,'done')) === '1'; }
function isSkip(r) { return localStorage.getItem(sk(r.orden,'skip')) === '1'; }

function toggleDone(order) {
  var k = sk(order,'done'), ks = sk(order,'skip');
  if (localStorage.getItem(k)==='1') localStorage.removeItem(k);
  else { localStorage.setItem(k,'1'); localStorage.removeItem(ks); }
  render(); closeSheet();
}
function toggleSkip(order) {
  var k = sk(order,'skip'), kd = sk(order,'done');
  if (localStorage.getItem(k)==='1') localStorage.removeItem(k);
  else { localStorage.setItem(k,'1'); localStorage.removeItem(kd); }
  render(); closeSheet();
}
function resetDay() {
  if (!confirm('¿Reiniciar avances del día?')) return;
  currentRows.forEach(function(r){ localStorage.removeItem(sk(r.orden,'done')); localStorage.removeItem(sk(r.orden,'skip')); });
  render();
}

// ─── DATA LOAD ──────────────────────────────
function loadDay(day) {
  currentDay = Math.max(1, Math.min(9, +day || 1));
  document.getElementById('app').innerHTML = '<div style="padding:40px 20px;color:white;font-family:Arial;text-align:center;">⏳ Cargando día ' + currentDay + '...</div>';
  closeSheet();

  var cache = 'rt_cache_' + currentDay;
  fetch(API_URL + '?format=json&day=' + currentDay)
    .then(function(r){ return r.json(); })
    .then(function(data){
      try { localStorage.setItem(cache, JSON.stringify(data)); } catch(e){}
      process(data);
    })
    .catch(function(){
      var c = localStorage.getItem(cache);
      if (c) { try { process(JSON.parse(c)); return; } catch(e){} }
      document.getElementById('app').innerHTML =
        '<div class="err-box">Sin conexión y sin datos guardados.<br>Conecta internet y recarga.</div>' + navHtml();
    });
}

function process(data) {
  currentRows = (data && data.rows) || [];
  currentMeta = (data && data.meta) || {};
  if (!currentRows.length) {
    document.getElementById('app').innerHTML =
      '<div class="err-box">No hay datos para el Día ' + currentDay + '.</div>' + navHtml();
    return;
  }
  render();
  setTimeout(scrollActiveDay, 80);
}

// ─── HERO IMAGE ─────────────────────────────
function heroImg() {
  var stops = currentRows.filter(function(r){ return type(r)==='stop'; });
  var pending = stops.filter(function(r){ return !isDone(r) && !isSkip(r); });
  for (var i=0;i<pending.length;i++) if (pending[i].imagen) return pending[i].imagen;
  for (var j=0;j<stops.length;j++) if (stops[j].imagen) return stops[j].imagen;
  return 'https://images.unsplash.com/photo-1502175353174-a7a70e73b362?w=900&q=80';
}

function type(r) { return String(r.tipo||'stop').toLowerCase(); }

// ─── NEXT STOP ──────────────────────────────
function nextStop() {
  var n = nowMin();
  var pending = currentRows.filter(function(r){ return type(r)==='stop' && !isDone(r) && !isSkip(r); });
  for (var i=0;i<pending.length;i++) {
    var ref = toMin(pending[i].hora_fin) || toMin(pending[i].hora_inicio);
    if (ref !== null && ref >= n) return pending[i];
  }
  return pending[0] || null;
}

function timeStatus(r) {
  if (!r) return '';
  var s = toMin(r.hora_inicio), e = toMin(r.hora_fin), n = nowMin();
  if (s === null) return 'Horario flexible';
  if (n < s) return 'Faltan ~' + (s-n) + ' min';
  if (e !== null && n > e) return 'Pasó hace ~' + (n-e) + ' min';
  return '¡Deberían estar aquí!';
}

// ─── WEATHER / BUDGET ────────────────────────
function weatherText() {
  for (var i=0;i<currentRows.length;i++) if (currentRows[i].weather_display) return currentRows[i].weather_display;
  return 'Clima disponible cerca del viaje';
}

function budgetText() {
  var totals = {}, maxTotals = {}, mxnMin = 0, mxnMax = 0, lines = [];
  var exch = currentMeta.exchange || {};
  currentRows.forEach(function(r){
    var m = String(r.moneda||'').toUpperCase(), min = money(r.precio_monto), max = money(r.precio_monto_max);
    if (!m || !min) return;
    totals[m] = (totals[m]||0) + min;
    maxTotals[m] = (maxTotals[m]||0) + (max||min);
  });
  Object.keys(totals).forEach(function(m){
    var mn = totals[m], mx = maxTotals[m];
    lines.push('$' + fmtMoney(mn) + (mx>mn?'–$'+fmtMoney(mx):'') + ' ' + m);
    var rate = m==='USD'?+exch.USD_MXN:m==='CAD'?+exch.CAD_MXN:m==='MXN'?1:0;
    if (rate) { mxnMin+=mn*rate; mxnMax+=mx*rate; }
  });
  if (!lines.length) return 'Sin costos fijos';
  var mxn = mxnMin>0 ? ' · ≈$'+fmtMoney(mxnMin)+(mxnMax>mxnMin?'–$'+fmtMoney(mxnMax):'')+' MXN' : '';
  return lines.join(' · ') + mxn;
}

// ─── RENDER ─────────────────────────────────
function render() {
  document.getElementById('app').innerHTML =
    heroHtml() + progressHtml() + dayTabsHtml() + nowHtml() + alertHtml() + timelineHtml() + navHtml();
}

function heroHtml() {
  var fecha = formatDate(currentMeta.fecha || '');
  var city = currentMeta.ciudad || 'Road Trip';
  return '<div class="hero">' +
    '<img class="hero-img" src="'+esc(heroImg())+'" alt="">' +
    '<div class="hero-grad"></div>' +
    '<div class="hero-top">' +
      '<button class="hero-btn" onclick="loadDay(currentDay-1)">‹</button>' +
      '<div class="hero-clock">Ahora · '+clock()+'</div>' +
      '<button class="hero-btn" onclick="loadDay(currentDay)">↻</button>' +
    '</div>' +
    '<div class="hero-body">' +
      '<p class="hero-eyebrow">Día '+currentDay+' de 9 · '+esc(fecha)+'</p>' +
      '<h1 class="hero-title">'+esc(city)+'</h1>' +
      '<div class="info-row">' +
        '<div class="info-pill"><span class="pill-icon">🌤️</span><span class="pill-text">'+esc(weatherText())+'</span></div>' +
        '<div class="info-pill"><span class="pill-icon">💸</span><span class="pill-text">'+esc(budgetText())+'</span></div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function progressHtml() {
  var h = '<div class="progress">';
  for (var i=1;i<=9;i++) {
    h += '<div class="p-dot'+(i<currentDay?' done':i===currentDay?' active':'')+'"></div>';
  }
  return h + '</div>';
}

function dayTabsHtml() {
  var h = '<div class="day-tabs" id="dayTabs">';
  for (var i=1;i<=9;i++) {
    h += '<button class="day-tab'+(i<currentDay?' past':i===currentDay?' active':'')+'" onclick="loadDay('+i+')">' +
      '<strong>'+esc(DAY_LABELS[i])+'</strong><span>Día '+i+'</span></button>';
  }
  return h + '</div>';
}

function scrollActiveDay() {
  var el = document.getElementById('dayTabs');
  if (!el) return;
  var a = el.querySelector('.day-tab.active');
  if (a) a.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

function nowHtml() {
  var next = nextStop();
  var stops = currentRows.filter(function(r){return type(r)==='stop';});
  var doneN = stops.filter(isDone).length;
  var skipN = stops.filter(isSkip).length;
  return '<div class="now-wrap"><div class="now-card">' +
    '<div class="now-label">Ahora</div>' +
    '<div class="now-title">'+(next?'Siguiente: '+esc(next.nombre):'Día completado 🎉')+'</div>' +
    '<div class="now-sub">'+(next?esc(timeStatus(next))+'':'')+' · '+doneN+' hechas · '+skipN+' saltadas</div>' +
    '<div class="now-btns">' +
      '<button class="now-btn primary" onclick="loadDay(currentDay)">↻ Actualizar</button>' +
      '<button class="now-btn sky" onclick="useLocation()">📍 Ubicación</button>' +
      '<button class="now-btn" onclick="resetDay()">Reiniciar</button>' +
      (next?'<button class="now-btn" onclick="openMaps(\''+esc(next.orden)+'\')">🗺 Maps</button>':'') +
    '</div>' +
  '</div></div>';
}

function alertHtml() {
  var alerts = currentRows.filter(function(r){return r.alerta;});
  if (!alerts.length) return '';
  return '<div class="alert-wrap"><div class="alert-strip">' +
    '<div class="alert-icon">⚠️</div>' +
    '<div><div class="alert-title">Importante hoy</div>' +
    '<div class="alert-sub">'+esc(alerts[0].alerta)+(alerts.length>1?' +' + (alerts.length-1) +' más':'')+'</div></div>' +
  '</div></div>';
}

function timelineHtml() {
  var h = '<div class="tl-header"><h2>Itinerario</h2><span>'+currentRows.filter(function(r){return type(r)==='stop';}).length+' paradas</span></div>';
  h += '<div class="timeline">';
  currentRows.forEach(function(r) {
    var t = type(r);
    if (t === 'transit') h += transitHtml(r);
    else if (t === 'night') h += nightHtml(r);
    else h += stopHtml(r);
  });
  return h + '</div>';
}

function stopHtml(r) {
  var p = timeParts(r.hora_inicio);
  var color = r.color || 'c-coral';
  var extra = (isDone(r)?' done-card':'') + (isSkip(r)?' skipped-card':'');
  return '<div class="stop-row">' +
    '<div class="stop-time"><span class="sh">'+esc(p.h)+'</span><span class="sa">'+esc(p.a)+'</span></div>' +
    '<div class="stop-dot">'+esc(r.emoji||'•')+'</div>' +
    '<div class="stop-card '+color+extra+'" onclick="openSheet(\''+esc(r.orden)+'\')">' +
      '<div class="stop-left">' +
        '<div class="stop-tag">'+esc((r.emoji||'')+ ' '+(r.categoria||'Parada'))+'</div>' +
        '<div class="stop-name">'+esc(r.nombre||'')+'</div>' +
        '<div class="stop-desc">'+esc(r.descripcion||'')+'</div>' +
      '</div>' +
      '<img class="stop-thumb" src="'+esc(r.imagen||'https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=200&q=60')+'" alt="">' +
      '<span class="stop-chevron">›</span>' +
    '</div>' +
  '</div>';
}

function transitHtml(r) {
  return '<div class="transit-row">' +
    '<div></div><div></div>' +
    '<div><span class="transit-pill">↳ '+esc(r.nombre||r.duracion||'Traslado')+(r.descripcion?' · '+esc(r.descripcion):'')+'</span></div>' +
  '</div>';
}

function nightHtml(r) {
  return '<div class="night-row"><div class="night-card">' +
    '<div class="night-icon">'+esc(r.emoji||'🛏️')+'</div>' +
    '<div class="night-text"><strong>'+esc(r.nombre||'Fin del día')+'</strong>'+esc(r.descripcion||r.direccion||'')+'</div>' +
  '</div></div>';
}

function navHtml() {
  var p = Math.max(1,currentDay-1), n = Math.min(9,currentDay+1);
  return '<div class="bottom-nav">' +
    '<button class="nav-btn" onclick="loadDay('+p+')">← Día '+p+'</button>' +
    '<div class="nav-center">Día <strong>'+currentDay+'</strong> / 9</div>' +
    '<button class="nav-btn primary" onclick="loadDay('+n+')">Día '+n+' →</button>' +
  '</div>';
}

// ─── SHEET (pantalla completa) ───────────────
function getRow(order) {
  for (var i=0;i<currentRows.length;i++) {
    if (String(currentRows[i].orden)===String(order)) return currentRows[i];
  }
  return null;
}

function openSheet(order) {
  var r = getRow(order);
  if (!r) return;
  var color = r.color || 'c-coral';
  var ts = tasks(r.que_hacer);
  var done = isDone(r), skip = isSkip(r);
  var exch = currentMeta.exchange || {};

  var h = '';

  // Image or placeholder
  if (r.imagen) {
    h += '<img class="sheet-img" src="'+esc(r.imagen)+'" alt="'+esc(r.nombre)+'">';
  } else {
    h += '<div class="sheet-img-placeholder">'+esc(r.emoji||'📍')+'</div>';
  }

  h += '<div class="sheet-content '+color+'">';

  // Tag + title
  h += '<div class="sheet-tag">'+esc((r.emoji||'')+ ' '+(r.categoria||'Parada'))+'</div>';
  h += '<div class="sheet-title">'+esc(r.nombre||'')+'</div>';
  if (r.descripcion) h += '<div class="sheet-desc">'+esc(r.descripcion)+'</div>';

  // Actions
  h += '<div class="sheet-actions">' +
    '<button class="sheet-action-btn maps" onclick="openMaps(\''+esc(r.orden)+'\')"><span class="btn-icon">🗺</span><span class="btn-label">Maps</span></button>' +
    '<button class="sheet-action-btn done" onclick="toggleDone(\''+esc(r.orden)+'\')"><span class="btn-icon">'+(done?'↩️':'✅')+'</span><span class="btn-label">'+(done?'Deshacer':'Hecho')+'</span></button>' +
    '<button class="sheet-action-btn skip" onclick="toggleSkip(\''+esc(r.orden)+'\')"><span class="btn-icon">'+(skip?'↩️':'⏭')+'</span><span class="btn-label">'+(skip?'No saltar':'Saltar')+'</span></button>' +
  '</div>';

  // Dirección
  if (r.direccion) {
    h += '<div class="sheet-section"><div class="sheet-section-title">Dirección</div>' +
      '<div class="sheet-address">' +
        '<div class="addr-icon">📍</div>' +
        '<div><div class="addr-main">'+esc(r.direccion)+'</div>' +
        (r.maps_query?'<div class="addr-sub">'+esc(r.maps_query)+'</div>':'')+
        '</div></div></div>';
  }

  // Qué hacer
  if (ts.length) {
    h += '<div class="sheet-section"><div class="sheet-section-title">Qué hacer aquí</div><div class="task-list">';
    ts.forEach(function(t){ h += '<div class="task-item"><div class="task-bullet"></div>'+esc(t)+'</div>'; });
    h += '</div></div>';
  }

  // Precio
  var precioDisplay = r.precio_display || r.precio || '';
  if (precioDisplay) {
    var min = money(r.precio_monto), max = money(r.precio_monto_max);
    var moneda = String(r.moneda||'').toUpperCase();
    var rate = moneda==='USD'?+exch.USD_MXN:moneda==='CAD'?+exch.CAD_MXN:moneda==='MXN'?1:0;
    var mxnLine = '';
    if (rate && min) {
      var mxnMin = min*rate, mxnMax = max?max*rate:mxnMin;
      mxnLine = '≈ $'+fmtMoney(mxnMin)+(mxnMax>mxnMin?'–$'+fmtMoney(mxnMax):'')+' MXN';
    }
    h += '<div class="sheet-section"><div class="sheet-section-title">Precio</div>' +
      '<div class="price-row"><div class="price-icon">💰</div>' +
      '<div><div class="price-value">'+esc(precioDisplay)+'</div>' +
      (mxnLine?'<div class="price-mxn">'+esc(mxnLine)+'</div>':'')+
      '</div></div></div>';
  }

  // Alerta
  if (r.alerta) {
    h += '<div class="sheet-alert"><div class="alert-icon">⚠️</div><div class="alert-text">'+esc(r.alerta)+'</div></div>';
  }

  h += '</div>'; // sheet-content

  document.getElementById('sheetContent').innerHTML = h;
  document.getElementById('sheet').classList.add('open');
  document.getElementById('sheetOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('sheetOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// Swipe down para cerrar sheet
var sheetStartY = 0;
document.getElementById('sheet').addEventListener('touchstart', function(e){ sheetStartY = e.touches[0].clientY; }, {passive:true});
document.getElementById('sheet').addEventListener('touchend', function(e){
  if (e.changedTouches[0].clientY - sheetStartY > 80) closeSheet();
}, {passive:true});

// ─── MAPS ───────────────────────────────────
function mapsUrl(r) {
  var q = r.maps_query || r.direccion || r.nombre || '';
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(q);
}

function openMaps(order) {
  var r = getRow(order);
  if (r) window.open(mapsUrl(r), '_blank');
}

// ─── LOCATION ───────────────────────────────
function useLocation() {
  if (!navigator.geolocation) { alert('Navegador sin soporte de ubicación.'); return; }
  navigator.geolocation.getCurrentPosition(
    function(p){ alert('Ubicación: ' + p.coords.latitude.toFixed(4) + ', ' + p.coords.longitude.toFixed(4)); },
    function(){ alert('No se pudo obtener la ubicación.'); },
    {enableHighAccuracy:true, timeout:10000}
  );
}

// ─── INIT ────────────────────────────────────
loadDay(1);
</script>
